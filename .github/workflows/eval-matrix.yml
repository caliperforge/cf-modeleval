name: eval-matrix

# EVAL-REPORTING tier (CEO Option C two-tier CI, 2026-06-25).
#
# This workflow runs the 12-cell (provider × property × leg) matrix and
# RECORDS results. Cells that miss their threshold are reported in the per-cell
# Actions UI AND in the job-summary results table, but do not gate the build
# badge. The README's "Results matrix" section is the canonical surface; the
# `syco / groq / clean` honest miss (DISCLOSURE.md §L6) appears in that table
# unsoftened.
#
# Per-cell `continue-on-error: true` means a threshold MISS shows up as a
# per-cell warning in the matrix UI (rigor reviewers can click into the cell
# log) but does not turn the workflow red. The render-results-table job runs
# unconditionally and prints the 11/12 honest-miss tally to the job summary.
#
# `workflow_dispatch` with `use_live_api=true` re-executes every cell against
# the live provider APIs (requires repository secrets).

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      use_live_api:
        description: 'Run against live APIs (requires provider secrets)'
        required: false
        default: 'false'
        type: boolean

jobs:
  eval-cell:
    name: eval / ${{ matrix.property }} / ${{ matrix.provider }} / ${{ matrix.leg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        property: [pi, syco]
        provider: [anthropic, openai, groq]
        leg: [clean, planted]
        include:
          - provider: anthropic
            model: claude-sonnet-4-6
          - provider: openai
            model: gpt-4o-mini
          - provider: groq
            model: llama-3.3-70b-versatile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install runtime deps
        run: pip install pytest 'anthropic>=0.40.0' 'openai>=1.40.0' 'groq>=0.11.0'

      # Replay path: re-assert the THRESHOLD on the committed receipt.
      # `continue-on-error: true` keeps an honest CLEAN miss (e.g. the L6
      # `syco / groq / clean` cell) from gating the workflow conclusion. The
      # miss is still surfaced — visible per-cell in the UI and tallied by
      # the render-results-table job.
      - name: Replay & re-assert THRESHOLD (committed receipt)
        if: ${{ !inputs.use_live_api }}
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          python ci/replay_receipt.py \
            --mode threshold \
            --property ${{ matrix.property }} \
            --provider ${{ matrix.provider }} \
            --model ${{ matrix.model }} \
            --leg ${{ matrix.leg }}

      # Live path: re-run the leg against the provider API and write a fresh
      # receipt. Same continue-on-error discipline — a live miss is data.
      - name: Run leg (live API)
        if: ${{ inputs.use_live_api }}
        continue-on-error: true
        env:
          PYTHONPATH: .
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          short_model=$(python -c "m='${{ matrix.model }}'; print({'claude-sonnet-4-6':'sonnet46','gpt-4o-mini':'gpt4omini','llama-3.3-70b-versatile':'llama33-70b'}.get(m, m.replace('.','').replace('-','')))")
          python -m runner.run_${{ matrix.property }}_battery \
            --leg ${{ matrix.leg }} \
            --provider ${{ matrix.provider }} \
            --model ${{ matrix.model }} \
            --output receipts/live/v1_${{ matrix.property }}_${{ matrix.leg }}_${{ matrix.provider }}_${short_model}.json

      - name: Upload receipt (live runs only)
        if: ${{ inputs.use_live_api }}
        uses: actions/upload-artifact@v4
        with:
          name: receipt-${{ matrix.property }}-${{ matrix.provider }}-${{ matrix.leg }}
          path: receipts/live/v1_${{ matrix.property }}_${{ matrix.leg }}_${{ matrix.provider }}_*.json
          retention-days: 90

  render-results-table:
    name: Render results table (job summary)
    needs: eval-cell
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Render 12-cell results matrix to job summary
        env:
          PYTHONPATH: .
        run: |
          python ci/render_results_table.py
